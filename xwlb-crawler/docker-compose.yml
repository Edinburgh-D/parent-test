version: "3.8"

services:
  xwlb-crawler:
    build: .
    container_name: xwlb-crawler
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    # 默认运行定时调度
    command: python main.py schedule
    # 如需立即运行一次测试，取消下面注释并注释掉上面的 command
    # command: python main.py run

